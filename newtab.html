<!doctype html>
<html>
<head>
  <meta charset="utf-8">
  <title>New Tab</title>
  <link rel="icon" type="image/png" href="icons/icon48.png">
  <link rel="stylesheet" href="fonts.css">
  <link rel="stylesheet" href="newtab.css">
</head>
<body>
  <div id="wallpaper"></div>

  <main>
    <div id="clock">
      <div id="time"></div>
      <div id="date" class="mono"></div>
    </div>

    <form id="search" autocomplete="off">
      <img id="search-clover" src="assets/clover.png" alt="">
      <input id="q" type="text" placeholder="Search the web" spellcheck="false" autofocus>
      <span class="mono hint">↵</span>
    </form>
  </main>

  <script src="newtab.js"></script>
</body>
</html>
